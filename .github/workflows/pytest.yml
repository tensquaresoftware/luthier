name: pytest

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    # macos-latest = Apple Silicon runner (ARM64); aligns with ARM64-only Luthier.app distribution
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    env:
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Qt runtime dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y --no-install-recommends libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Create venv, install dependencies, run pytest
        shell: bash
        run: |
          python -m venv .venv
          if [[ "${{ matrix.os }}" == windows-* ]]; then
            PY=".venv/Scripts/python"
          else
            PY=".venv/bin/python"
          fi
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install -r requirements-dev.txt
          "$PY" -m pytest
